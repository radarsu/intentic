name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write   # semantic-release pushes the tag + creates the GitHub Release
  id-token: write   # npm trusted publishing (OIDC)
  packages: write   # push the runner/sandbox images to GHCR (semantic-release successCmd)

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm turbo run build
      - run: pnpm turbo run test

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          registry-url: https://registry.npmjs.org
      # Docker + GHCR auth so semantic-release's successCmd (scripts/publish-images.sh) can build + push the
      # runner/sandbox images at the release version.
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
