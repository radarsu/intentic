name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write   # semantic-release pushes the tag + creates the GitHub Release
  id-token: write   # npm trusted publishing (OIDC)
  packages: write   # push the sandbox image to GHCR (semantic-release successCmd)

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm turbo run build
      - run: pnpm turbo run test

  release:
    needs: verify
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          registry-url: https://registry.npmjs.org
      # Bun cross-compiles the intentic-sync standalone binaries (semantic-release prepareCmd).
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      # Docker + GHCR auth so semantic-release's successCmd (scripts/publish-images.sh) can build + push the
      # sandbox image at the release version.
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
