name: Images

# Continuous image publishing: build + push the runner/sandbox images to the repo's GHCR on every push to
# main that touches them (moving `latest` + the commit SHA, for fast iteration). The version-tagged, digest-
# pinned images that images.ts references are published separately by the release (see .releaserc.json).
on:
  push:
    branches: [main]
    paths:
      - _apps/runner/**
      - _apps/sandbox/**
      - _apps/cli/**
      - _libs/**
      - scripts/publish-images.sh
      - pnpm-lock.yaml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: TAGS="latest sha-${GITHUB_SHA::7}" bash scripts/publish-images.sh
