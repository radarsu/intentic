packages:
  - _*/*

allowBuilds:
  cpu-features: false
  esbuild: true
  protobufjs: false
  ssh2: false

catalog:
  '@anthropic-ai/claude-agent-sdk': 0.3.195
  '@biomejs/biome': 2.5.1
  '@hono/node-server': 2.0.6
  '@semantic-release/exec': 7.1.0
  '@semantic-release/github': 12.0.8
  '@stricli/core': 1.2.8
  '@types/node': 24.13.2
  '@types/ssh2': 1.15.5
  hono: 4.12.27
  knip: 6.23.0
  semantic-release: 25.0.5
  ssh2: 1.17.0
  testcontainers: 12.0.3
  tslib: 2.8.1
  turbo: 2.10.0
  typescript: 5.9.3
  vitest: 4.1.9
  zod: 4.4.3

injectWorkspacePackages: true

minimumReleaseAgeExclude:
  - knip@6.23.0

onlyBuiltDependencies:
  - '@biomejs/biome'

syncInjectedDepsAfterScripts:
  - build

useNodeVersion: 24.18.0
