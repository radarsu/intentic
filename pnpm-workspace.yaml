packages:
  - _*/*

allowBuilds:
  cpu-features: false
  esbuild: true
  protobufjs: false
  ssh2: false

catalog:
  '@biomejs/biome': 2.4.16
  '@semantic-release/exec': 7.1.0
  '@semantic-release/github': 12.0.8
  '@types/node': 25.5.2
  knip: 6.2.0
  semantic-release: 25.0.3
  tslib: 2.8.1
  turbo: 2.9.16
  typescript: 5.9.3
  vitest: 3.2.4
  zod: 4.4.3

injectWorkspacePackages: true

onlyBuiltDependencies:
